name: Build And Publish Backend Docker

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/build-backend-docker.yml"
  workflow_dispatch:

# ✅ 1. 防止并发运行导致冲突
concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 2. 统一计算 image name，减少步骤
      - name: Compute image names
        id: images
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${OWNER}/xunjian-backend" >> "$GITHUB_OUTPUT"
          echo "acr=${{ secrets.ALIYUN_ACR_REGISTRY }}/otham/xunjian" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # ✅ 3. 一次构建，推送到两个 registry（核心优化）
      - name: Build and push to all registries
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ steps.images.outputs.ghcr }}:latest
            ${{ steps.images.outputs.ghcr }}:${{ github.sha }}
            ${{ steps.images.outputs.ghcr }}:${{ github.ref_name }}
            ${{ steps.images.outputs.acr }}:latest
            ${{ steps.images.outputs.acr }}:${{ github.sha }}
            ${{ steps.images.outputs.acr }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    # ✅ 4. 部署超时保护
    timeout-minutes: 10

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.1  # ✅ 5. 升级版本
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          # ✅ 6. 设置超时
          timeout: 120s
          command_timeout: 5m
          # ✅ 7. 通过 env + envs 安全传递 secrets
          envs: ALIYUN_ACR_REGISTRY,ALIYUN_ACR_USERNAME,ALIYUN_ACR_PASSWORD
          script: |
            set -e

            # ============================================
            # 宿主机数据目录（所有持久化数据统一管理）
            # ============================================
            DATA_HOME="/data/xunjian"

            IMAGE_BASE="${ALIYUN_ACR_REGISTRY}/otham/xunjian"
            IMAGE_LATEST="${IMAGE_BASE}:latest"

            echo "=== 确保宿主机数据目录结构 ==="
            mkdir -p "${DATA_HOME}/sessions"
            mkdir -p "${DATA_HOME}/photo"
            mkdir -p "${DATA_HOME}/risk"

            # config.json 兜底：首次部署时生成默认配置
            if [ ! -f "${DATA_HOME}/config.json" ]; then
              echo "  生成默认 config.json"
              cat > "${DATA_HOME}/config.json" << 'CONFEOF'
            {
              "port": 1145
            }
            CONFEOF
            else
              echo "  ✓ config.json 已存在，保留现有配置"
            fi

            # 数据库文件兜底：确保文件存在（即使为空），否则 Docker 挂载时会创建为目录
            if [ ! -f "${DATA_HOME}/mydatabase.db" ]; then
              echo "  ℹ mydatabase.db 不存在，容器首次启动时将自动创建"
              touch "${DATA_HOME}/mydatabase.db"
            else
              echo "  ✓ mydatabase.db 已存在"
            fi

            echo ""
            echo "Logging in to Alibaba Cloud ACR"
            echo "${ALIYUN_ACR_PASSWORD}" | docker login "${ALIYUN_ACR_REGISTRY}" -u "${ALIYUN_ACR_USERNAME}" --password-stdin

            echo "Pulling latest image from Alibaba Cloud ACR"
            # ✅ 8. 添加重试逻辑（网络波动时自动重试）
            for i in 1 2 3; do
              docker pull "${IMAGE_LATEST}" && break
              echo "Pull attempt $i failed, retrying in 5s..."
              sleep 5
            done

            echo "Stopping old container if exists"
            docker stop xunjian-backend || true
            docker rm xunjian-backend || true

            echo "Starting new container with volume mounts"
            docker run -d \
              --name xunjian-backend \
              --restart unless-stopped \
              --memory="512m" \
              --cpus="1" \
              -p 1145:1145 \
              -e PORT=1145 \
              -v "${DATA_HOME}/mydatabase.db:/app/mydatabase.db" \
              -v "${DATA_HOME}/config.json:/app/config.json" \
              -v "${DATA_HOME}/sessions:/app/sessions" \
              -v "${DATA_HOME}/photo:/app/photo" \
              -v "${DATA_HOME}/risk:/app/risk" \
              "${IMAGE_LATEST}"

            # ✅ 9. 清理旧镜像
            echo "Cleaning old images"
            docker image prune -a --force --filter "until=24h"
