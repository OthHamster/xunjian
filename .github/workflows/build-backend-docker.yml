name: Build And Publish Backend Docker

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/build-backend-docker.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute GHCR image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/xunjian-backend" >> "$GITHUB_OUTPUT"

      - name: Compute ACR image name
        id: image-acr
        run: echo "name=${{ secrets.ALIYUN_ACR_REGISTRY }}/otham/xunjian" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract metadata for ACR
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-acr.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-acr.outputs.labels }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            ACR_REGISTRY="${{ secrets.ALIYUN_ACR_REGISTRY }}"
            ACR_USERNAME="${{ secrets.ALIYUN_ACR_USERNAME }}"
            ACR_PASSWORD="${{ secrets.ALIYUN_ACR_PASSWORD }}"
            IMAGE_NAME="${ACR_REGISTRY}/otham/xunjian:latest"

            echo "Logging in to Alibaba Cloud ACR"
            echo "${ACR_PASSWORD}" | docker login "${ACR_REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

            echo "Pulling latest image from Alibaba Cloud ACR"
            docker pull "${IMAGE_NAME}"

            echo "Stopping old container if exists"
            docker stop xunjian-backend || true
            docker rm xunjian-backend || true

            echo "Starting new container"
            docker run -d \
              --name xunjian-backend \
              --restart unless-stopped \
              -p 1145:1145 \
              -e PORT=1145 \
              "${IMAGE_NAME}"

            echo "Cleaning dangling images"
            docker image prune -f
