name: Build And Publish Backend Docker

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/build-backend-docker.yml"
  workflow_dispatch:

# ✅ 1. 防止并发运行导致冲突
concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 2. 统一计算 image name，减少步骤
      - name: Compute image names
        id: images
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr=ghcr.io/${OWNER}/xunjian-backend" >> "$GITHUB_OUTPUT"
          echo "acr=${{ secrets.ALIYUN_ACR_REGISTRY }}/otham/xunjian" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # ✅ 3. 一次构建，推送到两个 registry（核心优化）
      - name: Build and push to all registries
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ steps.images.outputs.ghcr }}:latest
            ${{ steps.images.outputs.ghcr }}:${{ github.sha }}
            ${{ steps.images.outputs.ghcr }}:${{ github.ref_name }}
            ${{ steps.images.outputs.acr }}:latest
            ${{ steps.images.outputs.acr }}:${{ github.sha }}
            ${{ steps.images.outputs.acr }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    # ✅ 4. 部署超时保护
    timeout-minutes: 10

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.1 # ✅ 5. 升级版本
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          # ✅ 6. 设置超时
          timeout: 120s
          command_timeout: 5m
          script_stop: true
          # ✅ 7. 不在 script 里暴露 secrets，用 env 传入
          envs: ALIYUN_ACR_REGISTRY,ALIYUN_ACR_USERNAME,ALIYUN_ACR_PASSWORD
          script: |
            set -e

            IMAGE_BASE="${ALIYUN_ACR_REGISTRY}/otham/xunjian"
            IMAGE_LATEST="${IMAGE_BASE}:latest"

            echo "Logging in to Alibaba Cloud ACR"
            echo "${ALIYUN_ACR_PASSWORD}" | docker login "${ALIYUN_ACR_REGISTRY}" -u "${ALIYUN_ACR_USERNAME}" --password-stdin

            echo "Pulling latest image from Alibaba Cloud ACR"
            # ✅ 8. 添加重试逻辑（网络波动时自动重试）
            for i in 1 2 3; do
              docker pull "${IMAGE_LATEST}" && break
              echo "Pull attempt $i failed, retrying in 5s..."
              sleep 5
            done

            echo "Stopping old container if exists"
            docker stop xunjian-backend || true
            docker rm xunjian-backend || true

            echo "Starting new container"
            docker run -d \
              --name xunjian-backend \
              --restart unless-stopped \
              --memory="512m" \
              --cpus="1" \
              -p 1145:1145 \
              -e PORT=1145 \
              "${IMAGE_LATEST}"

            # ✅ 9. 清理旧镜像
            echo "Cleaning old images"
            docker image prune -a --force --filter "until=24h"
