name: Build And Publish Backend Docker

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/build-backend-docker.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xunjian-backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            echo "Logging in to GHCR"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "Pulling latest image"
            docker pull ghcr.io/${{ github.repository_owner }}/xunjian-backend:latest

            echo "Stopping old container if exists"
            docker stop xunjian-backend || true
            docker rm xunjian-backend || true

            echo "Starting new container"
            docker run -d \
              --name xunjian-backend \
              --restart unless-stopped \
              -p 1145:1145 \
              -e PORT=1145 \
              ghcr.io/${{ github.repository_owner }}/xunjian-backend:latest

            echo "Cleaning dangling images"
            docker image prune -f
